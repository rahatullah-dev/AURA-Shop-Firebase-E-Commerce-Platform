<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Aura Admin – Messages</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    .messages-container {
      background: var(--admin-card);
      border-radius: 12px;
      box-shadow: var(--admin-shadow);
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .empty-state {
      max-width: 400px;
    }
    .empty-icon {
      width: 64px;
      height: 64px;
      background: var(--admin-accent-soft);
      color: var(--admin-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .empty-icon svg {
      width: 32px;
      height: 32px;
    }
    .empty-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--admin-dark);
      margin-bottom: 8px;
    }
    .empty-desc {
      font-size: 0.9rem;
      color: var(--admin-light);
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="admin-layout">
    
    <!-- SIDEBAR -->
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">A</div>
        <div class="sidebar-brand-text">Aura<span>Admin Panel</span></div>
      </div>

      <div class="sidebar-user">
        <div class="sidebar-avatar" id="adminAvatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="adminName">Loading...</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
        <button class="sidebar-logout" id="logoutBtn" title="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>

      <ul class="sidebar-nav">
        <div class="sidebar-nav-label">Main Menu</div>
        <li>
          <a href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="orders.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            Orders
          </a>
        </li>
        <li>
          <a href="products.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
              <line x1="7" y1="7" x2="7.01" y2="7" />
            </svg>
            Products
          </a>
        </li>
        <li>
          <a href="categories.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Categories
          </a>
        </li>
        <li>
          <a href="settings.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            Settings
          </a>
        </li>
        
        <div class="sidebar-nav-label" style="margin-top:12px;">Storefront</div>
        <li>
          <a href="../index.html" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
            View Live Store
          </a>
        </li>
      </ul>
    </aside>
    <div class="drawer-overlay" id="sidebarOverlay"></div>

    <!-- MAIN CONTENT -->
    <main class="admin-main">
      <div class="admin-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" id="menuBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>
          </button>
          <h1>Message Center</h1>
        </div>
        <div class="admin-topbar-actions" style="display:flex; align-items:center; gap:12px;">
          <!-- Top Avatar -->
          <a href="profile.html" title="Admin Profile">
            <img id="adminTopAvatar" class="nav-avatar" src="../assets/images/placeholder.png" alt="Admin" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--admin-primary); cursor: pointer; display: none;">
          </a>
        </div>
      </div>

      <div class="admin-content">
        <div class="messages-container">
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            </div>
            <h2 class="empty-title">No Messages Yet</h2>
            <p class="empty-desc">Your message inbox is currently empty. Direct communication with customers will appear here.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAdmin } from '../js/adminService.js';
    import { logout } from '../js/auth.js';
    import { loadAdminProfile } from '../js/adminProfile.js';

    let currentUser;

    async function init() {
      currentUser = await requireAdmin();
      if (!currentUser) return;
      
      const profile = await loadAdminProfile() || {};
      
      // Update basic UI avatars
      function updateAvatarUI(photoUrl, defaultInitial) {
        if (photoUrl) {
          document.getElementById('adminAvatar').innerHTML = `<img src="${photoUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
          const topAvatar = document.getElementById('adminTopAvatar');
          if (topAvatar) {
            topAvatar.src = photoUrl;
            topAvatar.style.display = 'block';
          }
        } else {
          document.getElementById('adminAvatar').textContent = defaultInitial;
          const topAvatar = document.getElementById('adminTopAvatar');
          if (topAvatar) {
            topAvatar.style.display = 'none';
          }
        }
      }
      
      const defaultInitial = (profile.name || currentUser.displayName || currentUser.email || 'A')[0].toUpperCase();
      const currentPhotoUrl = profile.photoURL || profile.photoUrl || currentUser.photoURL;
      
      document.getElementById('adminName').textContent = profile.name || currentUser.displayName || 'Admin';
      updateAvatarUI(currentPhotoUrl, defaultInitial);
    }

    init();

    // ── LOGOUT
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if(confirm('Are you sure you want to log out?')) { await logout(); }
    });
  </script>
</body>
</html>
