<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Aura Admin – Profile</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    .profile-card {
      background: var(--admin-surface);
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      box-shadow: var(--admin-shadow);
    }
    .profile-form-group {
      margin-bottom: 20px;
    }
    .profile-form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--admin-mid);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .profile-form-group input,
    .profile-form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--admin-radius-sm);
      border: 1.5px solid var(--admin-border);
      background: #fff;
      color: var(--admin-dark);
      font-family: 'Outfit', sans-serif;
      font-size: 0.86rem;
      outline: none;
      transition: border-color var(--admin-tr), box-shadow var(--admin-tr);
    }
    .profile-form-group input:focus,
    .profile-form-group textarea:focus {
      border-color: var(--admin-accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .profile-form-group input::placeholder,
    .profile-form-group textarea::placeholder {
      color: var(--admin-light);
    }
    .profile-form-group input:disabled {
      background: #f8fafc;
      color: var(--admin-light);
      cursor: not-allowed;
    }
    .avatar-upload-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--admin-accent-soft);
      border: 2px solid var(--admin-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 600;
      color: var(--admin-accent);
      flex-shrink: 0;
    }
    #uploadProgress {
      display: none;
      color: var(--admin-accent);
      font-size: 0.9rem;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="admin-layout">
    
    <!-- SIDEBAR -->
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">A</div>
        <div class="sidebar-brand-text">Aura<span>Admin Panel</span></div>
      </div>

      <div class="sidebar-user">
        <div class="sidebar-avatar" id="adminAvatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="adminName">Loading...</div>
          <div class="sidebar-user-role">Administrator</div>
        </div>
        <button class="sidebar-logout" id="logoutBtn" title="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>

      <ul class="sidebar-nav">
        <div class="sidebar-nav-label">Main Menu</div>
        <li>
          <a href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="5" rx="1" />
              <rect x="14" y="12" width="7" height="9" rx="1" />
              <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="orders.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            Orders
          </a>
        </li>
        <li>
          <a href="products.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
              <line x1="7" y1="7" x2="7.01" y2="7" />
            </svg>
            Products
          </a>
        </li>
        <li>
          <a href="categories.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Categories
          </a>
        </li>
        
        <div class="sidebar-nav-label" style="margin-top:12px;">Users</div>
        <li>
          <a href="users.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            Users
          </a>
        </li>
        
        <div class="sidebar-nav-label" style="margin-top:12px;">Storefront</div>
        <li>
          <a href="../index.html" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
            View Live Store
          </a>
        </li>
      </ul>
    </aside>
    <div class="drawer-overlay" id="sidebarOverlay"></div>

    <!-- MAIN CONTENT -->
    <main class="admin-main">
      <div class="admin-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" id="menuBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>
          </button>
          <h1>Admin Profile</h1>
        </div>
        <div class="admin-topbar-actions" style="display:flex; align-items:center; gap:12px;">
          <!-- Top Avatar -->
          <a href="profile.html" title="Admin Profile">
            <img id="adminTopAvatar" class="nav-avatar" src="../assets/images/placeholder.png" alt="Admin" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--admin-primary); cursor: pointer; display: none;">
          </a>
        </div>
      </div>

      <div class="admin-content">
        <div class="profile-card">
          <h2 style="margin-bottom: 24px;">Edit Profile</h2>
          
          <form id="profileForm">
            <div class="avatar-upload-wrap">
              <img id="profileAvatarPreview" class="avatar-preview" src="../assets/images/placeholder.png" alt="Preview">
              <div>
                <label for="avatarInput" class="btn btn-sm btn-secondary" style="cursor: pointer;">Upload New Photo</label>
                <input type="file" id="avatarInput" accept="image/*" hidden>
                <div id="uploadProgress">Uploading: 0%</div>
              </div>
            </div>

            <div class="profile-form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Enter full name" required>
            </div>

            <div class="profile-form-group">
              <label for="email">Email</label>
              <input type="email" id="email" disabled style="opacity: 0.7; cursor: not-allowed;" title="Email can be changed in settings">
            </div>

            <div class="profile-form-group">
              <label for="phone">Phone Number</label>
              <input type="text" id="phone" placeholder="Enter phone number">
            </div>

            <div class="profile-form-group">
              <label for="bio">Bio</label>
              <textarea id="bio" rows="4" placeholder="Short bio..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary" id="saveProfileBtn">Save Profile</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAdmin } from '../js/adminService.js';
    import { logout } from '../js/auth.js';
    import { loadAdminProfile, saveAdminProfile, uploadAvatar } from '../js/adminProfile.js';

    let currentUser;
    let newAvatarUrl = null;

    async function init() {
      currentUser = await requireAdmin();
      if (!currentUser) return;
      
      const profile = await loadAdminProfile() || {};
      
      // Update basic UI avatars
      function updateAvatarUI(photoUrl, defaultInitial) {
        if (photoUrl) {
          document.getElementById('adminAvatar').innerHTML = `<img src="${photoUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
          const topAvatar = document.getElementById('adminTopAvatar');
          if (topAvatar) {
            topAvatar.src = photoUrl;
            topAvatar.style.display = 'block';
          }
        } else {
          document.getElementById('adminAvatar').textContent = defaultInitial;
          const topAvatar = document.getElementById('adminTopAvatar');
          if (topAvatar) {
            topAvatar.style.display = 'none';
          }
        }
      }
      
      const defaultInitial = (profile.name || currentUser.displayName || currentUser.email || 'A')[0].toUpperCase();
      const currentPhotoUrl = profile.photoURL || profile.photoUrl || currentUser.photoURL;
      
      document.getElementById('adminName').textContent = profile.name || currentUser.displayName || 'Admin';
      updateAvatarUI(currentPhotoUrl, defaultInitial);

      // Populate Form
      document.getElementById('fullName').value = profile.name || currentUser.displayName || '';
      document.getElementById('email').value = currentUser.email || '';
      document.getElementById('phone').value = profile.phone || '';
      document.getElementById('bio').value = profile.bio || '';
      if(currentPhotoUrl) {
        document.getElementById('profileAvatarPreview').src = currentPhotoUrl;
      } else {
        // Show initial if no image
        document.getElementById('profileAvatarPreview').outerHTML = `<div id="profileAvatarPreview" class="avatar-preview">${defaultInitial}</div>`;
      }
    }

    init();

    // ── LOGOUT
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if(confirm('Are you sure you want to log out?')) {
        await logout();
      }
    });

    // ── IMAGE UPLOAD
    document.getElementById('avatarInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const progressEl = document.getElementById('uploadProgress');
      progressEl.style.display = 'block';
      progressEl.textContent = 'Uploading...';

      try {
        const url = await uploadAvatar(file, (percent) => {
          progressEl.textContent = `Uploading: ${percent}%`;
        });
        newAvatarUrl = url;
        
        const preview = document.getElementById('profileAvatarPreview');
        if (preview.tagName === 'DIV') {
            const img = document.createElement('img');
            img.id = 'profileAvatarPreview';
            img.className = 'avatar-preview';
            img.src = url;
            preview.parentNode.replaceChild(img, preview);
        } else {
            preview.src = url;
        }
        
        progressEl.textContent = 'Upload complete!';
        setTimeout(() => progressEl.style.display = 'none', 2000);
      } catch (err) {
        console.error(err);
        progressEl.textContent = 'Upload failed!';
        progressEl.style.color = 'var(--admin-red)';
      }
    });

    // ── SAVE FORM
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveProfileBtn');
      const originalText = btn.textContent;
      btn.textContent = 'Saving...';
      btn.disabled = true;

      const data = {
        name: document.getElementById('fullName').value,
        phone: document.getElementById('phone').value,
        bio: document.getElementById('bio').value
      };
      if (newAvatarUrl) {
        data.photoURL = newAvatarUrl;
      }

      try {
        await saveAdminProfile(data);
        btn.textContent = 'Saved!';
        
        // Update local displays
        const updatedPhotoUrl = newAvatarUrl || currentUser.photoURL || currentUser.profile?.photoURL || currentUser.profile?.photoUrl;
        const initial = (data.name || currentUser.email || 'A')[0].toUpperCase();
        
        if (updatedPhotoUrl) {
          document.getElementById('adminAvatar').innerHTML = `<img src="${updatedPhotoUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
          const topAvatar = document.getElementById('adminTopAvatar');
          if (topAvatar) {
            topAvatar.src = updatedPhotoUrl;
            topAvatar.style.display = 'block';
          }
        } else {
          document.getElementById('adminAvatar').textContent = initial;
        }
        document.getElementById('adminName').textContent = data.name;
        
      } catch (err) {
        console.error(err);
        alert('Failed to save profile');
      } finally {
        setTimeout(() => {
          btn.textContent = originalText;
          btn.disabled = false;
        }, 2000);
      }
    });
  </script>
</body>
</html>
