<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="96" cy="96" r="96" fill="url(#gradient)" />
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="192" y2="192">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shopping Bag Icon -->
  <g transform="translate(40, 50)">
    <!-- Bag Handle -->
    <path d="M 32 32 Q 32 20 20 20 Q 8 20 8 32" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
    
    <!-- Bag Body -->
    <rect x="8" y="32" width="48" height="60" rx="4" fill="white" />
    
    <!-- Bag Front Highlight -->
    <rect x="12" y="36" width="40" height="52" rx="3" fill="url(#lightGradient)" opacity="0.3" />
    
    <!-- Sparkle/Shine Elements -->
    <circle cx="28" cy="42" r="2.5" fill="#2563eb" opacity="0.8" />
    <circle cx="40" cy="52" r="2" fill="#2563eb" opacity="0.6" />
    <circle cx="32" cy="70" r="2.5" fill="#2563eb" opacity="0.8" />
    
    <defs>
      <linearGradient id="lightGradient" x1="0" y1="0" x2="40" y2="52">
        <stop offset="0%" style="stop-color:white;stop-opacity:0.6" />
        <stop offset="100%" style="stop-color:white;stop-opacity:0" />
      </linearGradient>
    </defs>
  </g>
  
  <!-- Top Circle Accent -->
  <circle cx="96" cy="30" r="6" fill="white" opacity="0.7" />
  <circle cx="96" cy="30" r="4" fill="white" />
</svg>
