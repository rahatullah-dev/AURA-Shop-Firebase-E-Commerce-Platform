<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Aura – Forgot Password</title>
  <meta name="description" content="Reset your Aura Shop password. Enter your email to receive a password reset link." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="apple-touch-icon" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #dde3ff 0%, #fff6ef 100%)
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 48px rgba(26, 115, 232, 0.10)
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1a73e8, #4fa3f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      font-weight: 900
    }

    .logo-text {
      font-size: 26px;
      font-weight: 900;
      color: #1a73e8
    }

    .logo-text span {
      color: #f5a623
    }

    h2 {
      text-align: center;
      font-size: 19px;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: .4px;
      text-transform: uppercase;
      margin: 18px 0 8px
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5
    }

    /* Lock icon container */
    .icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px
    }

    .icon-circle {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #dde3ff, #e8f0fe);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .icon-circle svg {
      width: 30px;
      height: 30px;
      color: #1a73e8
    }

    .field {
      position: relative;
      margin-bottom: 16px
    }

    .field label {
      position: absolute;
      top: -9px;
      left: 16px;
      background: #fff;
      padding: 0 5px;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      z-index: 1
    }

    .field input {
      width: 100%;
      border: 1.5px solid #e2e2e2;
      border-radius: 50px;
      padding: 13px 18px;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      color: #1a1a2e;
      outline: none;
      transition: border-color .2s, box-shadow .2s
    }

    .field input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, .10)
    }

    .field input::placeholder {
      color: #bbb
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      background: linear-gradient(135deg, #1a73e8, #4fa3f7);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 16px;
      transition: opacity .2s;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .btn-primary:hover {
      opacity: .92
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed
    }

    .back-link {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 4px
    }

    .back-link a {
      color: #1a73e8;
      font-weight: 800;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px
    }

    .toast {
      display: none;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 50px;
      margin-top: 14px
    }

    .toast.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block
    }

    .toast.error {
      background: #fdecea;
      color: #c62828;
      display: block
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* Success state shown after email is sent */
    .success-state {
      display: none;
      text-align: center
    }

    .success-state.visible {
      display: block
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      color: #2e7d32
    }

    .success-state h3 {
      font-size: 17px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 8px
    }

    .success-state p {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 20px
    }

    .success-state p strong {
      color: #1a1a2e
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">A</div>
      <span class="logo-text">Aura<span>.</span></span>
    </div>

    <!-- Default form state -->
    <div id="form-state">
      <div class="icon-wrap">
        <div class="icon-circle">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
      </div>

      <h2>Reset Password</h2>
      <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
      </div>

      <button class="btn-primary" id="reset-btn" onclick="handleReset()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Send Reset Link</span>
      </button>

      <div class="back-link">
        <a href="login.html">← Back to Login</a>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <!-- Success state shown after email sent -->
    <div class="success-state" id="success-state">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h3>Check Your Email</h3>
      <p>We've sent a password reset link to <strong id="sent-email"></strong>. Check your inbox and follow the
        instructions.</p>
      <a href="login.html" class="btn-primary" style="text-decoration:none; display:flex;">Back to Login</a>
      <div class="back-link" style="margin-top:12px">
        <a href="#" onclick="resendEmail()">Didn't receive it? Resend</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from '../firebase-config.js';
    import {
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let lastEmail = '';

    function setLoading(on) {
      document.getElementById('reset-btn').disabled = on;
      document.getElementById('spinner').style.display = on ? 'block' : 'none';
      document.getElementById('btn-text').textContent = on ? 'Sending…' : 'Send Reset Link';
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(() => t.className = 'toast', 4000);
    }

    window.handleReset = async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showToast('Please enter your email address.', 'error'); return; }

      setLoading(true);
      try {
        await sendPasswordResetEmail(auth, email);
        lastEmail = email;
        // Show success state
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('sent-email').textContent = email;
        document.getElementById('success-state').classList.add('visible');
      } catch (e) {
        const map = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
          'auth/missing-email': 'Please enter your email address.',
          'auth/network-request-failed': 'Network error. Check your connection.'
        };
        showToast(map[e.code] || 'Failed to send reset email. Please try again.', 'error');
      } finally { setLoading(false); }
    };

    window.resendEmail = async () => {
      if (!lastEmail) return;
      try {
        await sendPasswordResetEmail(auth, lastEmail);
        alert('Reset email resent to ' + lastEmail);
      } catch (e) {
        alert('Could not resend. Please try again later.');
      }
    };
  </script>
</body>

</html>
