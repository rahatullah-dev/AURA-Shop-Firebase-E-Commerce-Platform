<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AURA – Order Placed Successfully</title>
    <link rel="icon" type="image/svg+xml" href="./assets/images/faviconA.png" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0f4fb;--white:#fff;--dark:#111827;--mid:#4b5563;--light:#9ca3af;
      --accent:#2563eb;
      --green:#16a34a;--green-bg:#dcfce7;--green-dark:#166534;
      --radius:16px;--shadow:0 4px 24px rgba(17,24,39,.09);--tr:.22s ease;
    }
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px 60px;position:relative;overflow-x:hidden}
    
    .loading-state { text-align: center; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .confetti-piece{position:absolute;opacity:0;animation:confettiFall linear forwards}
    @keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}

    .page-center{position:relative;z-index:1;width:100%;max-width:900px;display:none;flex-direction:column;align-items:center;gap:0}
    .page-center.loaded { display: flex; }

    .check-wrap{margin-bottom:24px;position:relative}
    .check-circle{width:110px;height:110px;filter:drop-shadow(0 4px 18px rgba(22,163,74,.2))}
    .progress-ring{transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
    .check-mark{transition:stroke-dashoffset .6s ease .9s}

    .success-title{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;color:var(--green-dark);text-align:center;margin-bottom:8px;letter-spacing:-.02em}
    .order-num{font-size:.95rem;color:var(--mid);text-align:center;margin-bottom:28px}
    .order-num strong{color:var(--dark);font-weight:700}

    .details-card{width:100%;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 28px;display:grid;grid-template-columns:1.2fr 1px 1fr 1px 1fr;gap:0;margin-bottom:28px;animation:slideUp .5s ease .3s both}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .col-divider{width:1px;background:#e5e7eb;margin:0 20px}

    .details-col{padding:0 4px}
    .col-title{font-size:.75rem;font-weight:800;letter-spacing:.1em;color:var(--light);text-transform:uppercase;margin-bottom:12px}
    .divider{height:1px;background:#e5e7eb;margin-bottom:14px}

    /* Items */
    .items-list { max-height: 250px; overflow-y: auto; padding-right: 10px; }
    .order-item{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .order-item:last-child{margin-bottom:0}
    .item-img{width:46px;height:46px;border-radius:8px;flex-shrink:0;background:#f3f4f6;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .item-img img { max-width:100%; max-height:100%; object-fit:contain; }
    .item-info{flex:1}
    .item-name{font-size:.85rem;font-weight:600;color:var(--dark);line-height:1.3}
    .item-qty{font-size:.82rem;color:var(--mid);min-width:30px;text-align:center}
    .item-price{font-size:.88rem;font-weight:700;color:var(--dark);min-width:60px;text-align:right}

    /* Shipping */
    .addr-name{font-size:.9rem;font-weight:700;color:var(--dark);margin-bottom:5px}
    .addr-line{font-size:.85rem;color:var(--mid);line-height:1.7}

    /* Total */
    .summary-row{display:flex;justify-content:space-between;font-size:.85rem;color:var(--mid);margin-bottom:8px;font-weight:500;}
    .total-row{font-size:1.1rem;font-weight:800;color:var(--dark);border-top:1px solid #e5e7eb;padding-top:10px;margin-top:4px}
    .total-amount{color:var(--green);font-size:1.15rem}
    .delivery-label{font-size:.7rem;font-weight:800;letter-spacing:.08em;color:var(--light);text-transform:uppercase;margin-bottom:5px}
    .delivery-date{font-size:.9rem;font-weight:700;color:var(--dark)}

    .action-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
    .btn-track{padding:13px 36px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.05em;border-radius:10px;cursor:pointer;transition:all var(--tr)}
    .btn-track:hover{background:var(--accent);color:#fff}
    .btn-continue{padding:13px 36px;background:var(--accent);color:#fff;border:none;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.05em;border-radius:10px;cursor:pointer;transition:all var(--tr);box-shadow:0 4px 14px rgba(37,99,235,.25)}
    .btn-continue:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 22px rgba(37,99,235,.35)}

    @media(max-width:760px){.details-card{grid-template-columns:1fr;gap:24px}.col-divider{display:none}}
  </style>
</head>
<body>

  <div class="loading-state" id="loader">Fetching Order Details...</div>
  <div class="confetti-wrap" id="confettiWrap"></div>

  <div class="page-center" id="page">

    <div class="check-wrap">
      <svg class="check-circle" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="54" stroke="#e2e8f0" stroke-width="8"/>
        <circle class="progress-ring" cx="60" cy="60" r="54" stroke="#16a34a" stroke-width="8" stroke-dasharray="339" stroke-dashoffset="339" stroke-linecap="round" transform="rotate(-90 60 60)"/>
        <circle cx="60" cy="60" r="44" fill="#dcfce7"/>
        <path class="check-mark" d="M38 60 L54 76 L82 44" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="60" stroke-dashoffset="60"/>
      </svg>
    </div>

    <h1 class="success-title">Order Placed Successfully!</h1>
    <p class="order-num">Order <strong id="display-order-num">...</strong></p>

    <div class="details-card">
      
      <!-- Items Ordered -->
      <div class="details-col items-col">
        <h3 class="col-title">ITEMS ORDERED</h3>
        <div class="divider"></div>
        <div class="items-list" id="order-items">
          <!-- Populated dynamically -->
        </div>
      </div>

      <div class="col-divider"></div>

      <!-- Shipping -->
      <div class="details-col shipping-col">
        <h3 class="col-title">SHIPPING ADDRESS</h3>
        <div class="divider"></div>
        <p class="addr-name" id="ship-name"></p>
        <p class="addr-line" id="ship-line1"></p>
        <p class="addr-line" id="ship-line2"></p>
        <p class="addr-line" style="margin-top:10px; font-weight:600;">Payment: <span id="payment-method"></span></p>
      </div>

      <div class="col-divider"></div>

      <!-- Total Paid -->
      <div class="details-col total-col">
        <h3 class="col-title">TOTAL PAID</h3>
        <div class="divider"></div>
        <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal"></span></div>
        <div class="summary-row" id="sum-discount-row" style="display:none; color:var(--green)"><span>Discount</span><span id="sum-discount"></span></div>
        <div class="summary-row"><span>Shipping</span><span id="sum-shipping"></span></div>
        <div class="summary-row"><span>Tax</span><span id="sum-tax"></span></div>
        <div class="summary-row total-row"><span>Total</span><span class="total-amount" id="sum-total"></span></div>
        <div class="divider" style="margin:16px 0 12px"></div>
        <p class="delivery-label">ESTIMATED DELIVERY DATE</p>
        <p class="delivery-date" id="est-delivery"></p>
      </div>

    </div>

    <div class="action-btns">
      <button class="btn-track" onclick="window.location.href='my-account.html?tab=orders'">VIEW MY ORDERS</button>
      <button class="btn-continue" onclick="window.location.href='products.html'">CONTINUE SHOPPING</button>
    </div>

  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    async function loadOrder() {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('orderId');

      if (!orderId) {
        alert("No order ID provided.");
        window.location.href = "products.html";
        return;
      }

      try {
        const docRef = doc(db, "orders", orderId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          alert("Order not found.");
          window.location.href = "products.html";
          return;
        }

        renderOrder(docSnap.data());
      } catch (err) {
        console.error(err);
        alert("Error fetching order.");
      }
    }

    function renderOrder(order) {
      document.getElementById('display-order-num').textContent = order.orderNumber;

      // Items
      document.getElementById('order-items').innerHTML = order.items.map(i => `
        <div class="order-item">
          <div class="item-img"><img src="${i.thumbnail}" alt="${i.name}"></div>
          <div class="item-info">
            <span class="item-name">${i.name}</span>
          </div>
          <span class="item-qty">x${i.qty}</span>
          <span class="item-price">$${(i.unitPrice * i.qty).toFixed(2)}</span>
        </div>
      `).join('');

      // Shipping
      const ship = order.shippingAddress;
      document.getElementById('ship-name').textContent = ship.name;
      document.getElementById('ship-line1').textContent = ship.street;
      document.getElementById('ship-line2').textContent = `${ship.city}, ${ship.state} ${ship.zip}`;
      const pmLabels = { cod: 'Cash on Delivery', card: 'Credit / Debit Card', easypaisa: 'EasyPaisa', jazzcash: 'JazzCash', bank: 'Bank Transfer' };
      document.getElementById('payment-method').textContent = pmLabels[order.paymentMethod] || order.paymentMethod;

      // Totals
      document.getElementById('sum-subtotal').textContent = `$${order.subtotal.toFixed(2)}`;
      document.getElementById('sum-shipping').textContent = order.shippingFee === 0 ? 'FREE' : `$${order.shippingFee.toFixed(2)}`;
      document.getElementById('sum-tax').textContent = `$${order.tax.toFixed(2)}`;
      document.getElementById('sum-total').textContent = `$${order.total.toFixed(2)}`;
      
      if (order.discountAmt > 0) {
        document.getElementById('sum-discount-row').style.display = 'flex';
        document.getElementById('sum-discount').textContent = `-$${order.discountAmt.toFixed(2)}`;
      }

      // Est Delivery (mock 5 days from now)
      const d = new Date();
      d.setDate(d.getDate() + 5);
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('est-delivery').textContent = d.toLocaleDateString('en-US', options);

      // Show Page & Animate
      document.getElementById('loader').style.display = 'none';
      document.getElementById('page').classList.add('loaded');
      
      setTimeout(() => {
        document.querySelector('.progress-ring').style.strokeDashoffset = '0';
        document.querySelector('.check-mark').style.strokeDashoffset = '0';
        launchConfetti();
      }, 100);
    }

    const COLORS = ['#2563eb','#16a34a','#f59e0b','#e53e3e','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    function launchConfetti() {
      const wrap = document.getElementById('confettiWrap');
      wrap.innerHTML = '';
      for (let i = 0; i < 80; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        const size = Math.random() * 9 + 5;
        p.style.cssText = `
          left:${Math.random()*100}%;
          top:-12px;
          width:${size}px; height:${size}px;
          background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
          border-radius:${Math.random()>.5?'50%':'3px'};
          animation-duration:${Math.random()*2.5+2}s;
          animation-delay:${Math.random()*2}s;
        `;
        wrap.appendChild(p);
      }
    }

    loadOrder();
  </script>
</body>
</html>
